<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindScope 思镜 · 对戏剧场</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css?v=3" />
<link rel="stylesheet" href="duo.css?v=11" />
</head>
<body>
<div class="grid-overlay"></div><div class="scanlines"></div>
<div class="console">
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand">MINDSCOPE</span><span class="brand-cn">思镜</span><span class="divider">▎</span>
      <nav class="tabs">
        <a class="tab" href="index.html">TIME-TRAVEL 调试器</a>
        <a class="tab" href="convtree.html">WORLD TREE 世界树</a>
        <a class="tab" href="forest.html">FOREST 森林</a>
        <a class="tab" href="lab.html">PROMPT-INJECTION LAB</a>
        <a class="tab" href="galgame.html">🌸 攻略镜</a>
        <a class="tab active">🎭 对戏</a>
      </nav>
    </div>
    <div class="topbar-center"><span>幕&nbsp;<b id="d-round">0</b></span><span>关系&nbsp;<b id="d-reltop">—</b></span></div>
    <div class="topbar-right"><span class="status-label">戏剧引擎</span><span class="status-pill"><i class="dot"></i><span id="d-status">待开场</span></span></div>
  </header>

  <!-- ════ 沉浸台本舞台 ════ -->
  <main class="duo2 panel" id="duo-stage" data-spk="">
    <div class="stage-ambient" id="stage-ambient"></div>
    <div class="stage-light"></div>
    <div class="stage-grain"></div>
    <div class="stage-aura a"></div><div class="stage-aura b"></div>
    <div class="duo2-fg">
      <!-- 场景条：slug + 关系仪表 + 控制 -->
      <div class="scenebar">
        <div class="sb-slug" id="d-slug">INT. 待 开 场</div>
        <div class="sb-gauge">
          <span class="duo-rname" id="d-rnA">苏</span>
          <div class="duo-reltrack" id="d-reltrack">
            <span id="d-relval" class="duo-relval">50</span>
            <div id="d-relmark" class="duo-relmark"></div>
          </div>
          <span class="duo-rname" id="d-rnB">洛</span>
        </div>
        <div class="sb-ctl">
          <button id="d-mapbtn" class="duo-btn" disabled>⌥ 故事地图</button>
          <button id="d-pause" class="duo-btn" disabled>⏸</button>
          <button id="d-castbtn" class="duo-btn">✎ 角色</button>
        </div>
      </div>
      <!-- 剧本 -->
      <div class="script" id="d-script">
        <div class="script-empty">
          <div class="se-curtain">· 幕 未 启 ·</div>
          <p>填两个角色（给谁一张暗牌？）与场景，开戏。<br>两个 AI 会带着各自的内心、招式与此消彼长的关系，演一场给你看。</p>
          <button id="d-open-setup" class="duo-btn primary">▶ 摆 角 色 · 开 戏</button>
          <div class="se-foot">灯 · 将 · 亮</div>
        </div>
      </div>
      <!-- 导演条 -->
      <div class="directbar">
        <span class="db-tag">🎬 导演</span>
        <select id="d-injtgt" class="d-mdl"><option value="all">全场旁白</option><option value="A">私语→苏</option><option value="B">私语→洛</option></select>
        <input id="d-inject" placeholder="插一句改走向：门外传来脚步声 / 你其实已经原谅他了" disabled />
        <button id="d-injectbtn" class="duo-btn" disabled>插</button>
      </div>
    </div>
  </main>
</div>

<!-- ════ 设置浮层 ════ -->
<div class="modal-back" id="setup-modal">
  <div class="modal-card setup-card">
    <div class="modal-head"><span>排 · 角色与开场</span><button id="setup-close" class="modal-x">✕</button></div>
    <div class="duo-two">
      <div class="duo-char a">
        <div class="duo-chead">角色 A <select id="d-modelA" class="d-mdl"><option value="kimi" selected>Kimi-K2.5</option><option value="qwen">Qwen3-Next</option><option value="ds">DeepSeek-V3.2</option><option value="dspro">V4-Pro(慢)</option><option value="glm">GLM-5.1(慢)</option></select></div>
        <input id="d-nameA" placeholder="名字" value="苏" />
        <textarea id="d-personaA" rows="2" placeholder="一句话人设">愤世嫉俗的落魄诗人，嘴硬心软，爱用反话</textarea>
        <input id="d-objA" placeholder="🎯 暗中想要的（可空）" value="想让对方留下来" />
        <input id="d-secA" placeholder="🃏 暗牌·只他自己知道（可空）" value="" />
      </div>
      <div class="duo-char b">
        <div class="duo-chead">角色 B <select id="d-modelB" class="d-mdl"><option value="kimi" selected>Kimi-K2.5</option><option value="qwen">Qwen3-Next</option><option value="ds">DeepSeek-V3.2</option><option value="dspro">V4-Pro(慢)</option><option value="glm">GLM-5.1(慢)</option></select></div>
        <input id="d-nameB" placeholder="名字" value="洛" />
        <textarea id="d-personaB" rows="2" placeholder="一句话人设">理性克制的心理医生，温和但有锋芒，善于追问</textarea>
        <input id="d-objB" placeholder="🎯 暗中想要的（可空）" value="想弄清他到底在逃避什么" />
        <input id="d-secB" placeholder="🃏 暗牌·只她自己知道（可空）" value="其实她明早就要离开这座城市" />
      </div>
    </div>
    <label class="ml">开场场景 / 话题</label>
    <textarea id="d-scene" rows="2" placeholder="开场场景 / 话题">深夜的旧书店打烊后，只剩他们俩和一壶凉掉的茶</textarea>
    <div class="setup-foot">
      <button id="d-reset" class="duo-btn">↺ 重置</button>
      <label class="inline">幕上限</label><input id="d-max" type="number" min="2" max="40" value="14" />
      <button id="d-start" class="duo-btn primary">▶ 开 戏</button>
    </div>
  </div>
</div>

<!-- ════ 故事地图浮层（分支节点树）════ -->
<div class="modal-back" id="map-modal">
  <div class="modal-card map-card">
    <div class="modal-head"><span>故 事 地 图 · 分支全貌</span><span class="mh-hint">点任一节点 → 从那一刻塞秘密重演（要是…会怎样）</span><button id="map-close" class="modal-x">✕</button></div>
    <div id="duo-tree" class="map-canvas"><div class="duo-empty2">开戏后，每句台词在这里长成一棵可分叉的树。</div></div>
    <div id="duo-fork" class="map-fork" hidden>
      <span class="mf-head">⏪ 从 <b id="d-forkcp">cp</b> 重演 · 给</span>
      <select id="d-forktgt" class="d-mdl"><option value="A">苏</option><option value="B">洛</option></select>
      <input id="d-forksec" placeholder="塞一条秘密指令：其实你一直在骗他 / 你已厌倦想摊牌" />
      <button id="d-forkgo" class="duo-btn primary">⏪ 分叉重演</button>
      <button id="d-forkcancel" class="duo-btn">取消</button>
    </div>
  </div>
</div>

<script src="tree-layout.js?v=4"></script>
<script src="duo.js?v=13"></script>
</body>
</html>
